version: "3.8"

services:
  db:
    image: postgres:16
    container_name: odoo19_db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: odoo
      POSTGRES_PASSWORD: odoo
    volumes:
      - odoo_pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odoo"]
      interval: 10s
      timeout: 5s
      retries: 5

  odoo:
    image: odoo:19.0
    container_name: odoo19_app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8069:8069"
      - "8072:8072"   # longpolling / live chat
    environment:
      HOST: db
      PORT: 5432
      USER: odoo
      PASSWORD: odoo
    volumes:
      # Custom addons folder — put your module here
      - ./addons:/mnt/extra-addons
      # Persistent filestore
      - odoo_filestore:/var/lib/odoo
      # Custom odoo.conf
      - ./config/odoo.conf:/etc/odoo/odoo.conf
    restart: unless-stopped
    command: odoo --dev=all

volumes:
  odoo_pgdata:
  odoo_filestore:
