name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

env:
  ODOO_IMAGE: odoo:19.0
  POSTGRES_DB: odoo_test
  POSTGRES_USER: odoo
  POSTGRES_PASSWORD: odoo

jobs:
  # ── 1. Linting ──────────────────────────────────────────────────────────────
  # Runs first — fast feedback (< 30s). Developers catch style issues
  # before the slow Docker test stage runs.
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 odoo/addons/ \
            --max-line-length=120 \
            --exclude=__pycache__,*.pyc,.git \
            --per-file-ignores="__init__.py:F401" \
            --statistics

  # ── 2. Unit / integration tests ─────────────────────────────────────────────
  # Runs on every PR push and on every push to develop/main.
  # The developer is responsible for fixing failures before requesting review.
  tests:
    name: Odoo Tests
    runs-on: ubuntu-latest
    needs: lint

    services:
      db:
        image: postgres:16
        env:
          POSTGRES_DB: ${{ env.POSTGRES_DB }}
          POSTGRES_USER: ${{ env.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ env.POSTGRES_PASSWORD }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U odoo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build module list dynamically — no need to update CI when adding modules
      - name: Discover custom modules
        id: modules
        run: |
          MODULES=$(ls odoo/addons/ | tr '\n' ',' | sed 's/,$//')
          echo "list=$MODULES" >> "$GITHUB_OUTPUT"

      - name: Pull Odoo image
        run: docker pull ${{ env.ODOO_IMAGE }}

      # Step 1: Bootstrap the database with Odoo's base schema.
      # This is required because CI starts with a blank Postgres — no tables,
      # no base module. Without this step, Odoo refuses to run tests.
      - name: Initialize Odoo database
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}/odoo/addons:/mnt/extra-addons" \
            -e HOST=localhost -e PORT=5432 \
            -e USER=${{ env.POSTGRES_USER }} \
            -e PASSWORD=${{ env.POSTGRES_PASSWORD }} \
            ${{ env.ODOO_IMAGE }} \
            odoo \
              --db_host=localhost --db_port=5432 \
              --db_user=${{ env.POSTGRES_USER }} \
              --db_password=${{ env.POSTGRES_PASSWORD }} \
              -d ${{ env.POSTGRES_DB }} \
              --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons \
              -i base \
              --stop-after-init \
              --without-demo=True \
              --log-level=warn

      # Step 2: Install custom modules and run their tagged tests.
      # --test-tags filters to only tests tagged with the module name,
      # matching the @tagged('actividades_complementarias') convention.
      - name: Install modules and run tests
        run: |
          docker run --rm \
            --network host \
            -v "${{ github.workspace }}/odoo/addons:/mnt/extra-addons" \
            -e HOST=localhost -e PORT=5432 \
            -e USER=${{ env.POSTGRES_USER }} \
            -e PASSWORD=${{ env.POSTGRES_PASSWORD }} \
            ${{ env.ODOO_IMAGE }} \
            odoo \
              --db_host=localhost --db_port=5432 \
              --db_user=${{ env.POSTGRES_USER }} \
              --db_password=${{ env.POSTGRES_PASSWORD }} \
              -d ${{ env.POSTGRES_DB }} \
              --addons-path=/mnt/extra-addons,/usr/lib/python3/dist-packages/odoo/addons \
              -i "${{ steps.modules.outputs.list }}" \
              --test-tags "${{ steps.modules.outputs.list }}" \
              --stop-after-init \
              --log-level=test \
              --without-demo=True

  # ── 3. Build Docker image ────────────────────────────────────────────────────
  # Validates the Dockerfile builds without errors.
  # Runs on PRs AND pushes — Dockerfile breakage is caught before merge,
  # not after. Does NOT push to any registry (that belongs in a deploy pipeline).
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The Dockerfile lives in infrastructure/ — set context and file path explicitly.
      - name: Build image (validation only — no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infrastructure/Dockerfile
          push: false
          tags: odoo-custom:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
